<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>everyblock | check any block before you buy or sell</title>
  <meta name="description" content="What is any HDB block really worth? Every registered resale since 1990, at block and floor level, on a 3D map of Singapore. No listings, no ads." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta property="og:title" content="everyblock | check any block before you buy or sell" />
  <meta property="og:description" content="What is any HDB block really worth? Every registered resale since 1990, block by block, floor by floor, on a 3D map of Singapore." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://everyblock.sg/" />
  <meta property="og:image" content="https://everyblock.sg/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://everyblock.sg/og.png" />
  <style>
    :root {
      --surface: rgba(26, 26, 25, 0.62);
      --ink: #ffffff;
      --ink-2: #c3c2b7;
      --ink-muted: #898781;
      --hairline: rgba(255, 255, 255, 0.10);
    }
    * { margin: 0; box-sizing: border-box; }
    html, body, #map { height: 100%; width: 100%; overflow: hidden; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0d0d0d;
      color: var(--ink);
    }
    .chip {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: 999px;
      backdrop-filter: blur(8px) saturate(1.15);
      -webkit-backdrop-filter: blur(8px) saturate(1.15);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      z-index: 10;
    }
    #title {
      top: 16px;
      left: 16px;
      font-size: 13px;
      color: var(--ink-2);
    }
    #title strong { color: var(--ink); font-weight: 600; }
    #title-mark { display: none; width: 22px; height: 22px; border-radius: 6px; }
    #search {
      top: 16px;
      right: 16px;
      padding: 10px 16px;
      width: min(280px, calc(100vw - 32px));
    }
    #search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--ink);
      font-size: 13px;
      font-family: inherit;
    }
    #search-input::placeholder { color: var(--ink-muted); }
    #search-results {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      /* More opaque than the chips: a nested backdrop-filter under the
         search chip renders weakly, so the surface carries the readability. */
      background: rgba(20, 20, 19, 0.9);
      border: 1px solid var(--hairline);
      border-radius: 16px;
      backdrop-filter: blur(22px) saturate(1.2);
      -webkit-backdrop-filter: blur(22px) saturate(1.2);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      padding: 6px;
    }
    #search-results.open { display: block; }
    #search-results .hit {
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    #search-results .hit-main {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }
    #search-results .hit-main span {
      font-size: 10px;
      color: var(--ink-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hit-badge {
      flex: none;
      font-size: 9px;
      color: var(--ink-muted);
      border: 1px solid var(--hairline);
      border-radius: 999px;
      padding: 1px 7px;
    }
    #search-results .hit.cur, #search-results .hit:hover { background: rgba(255, 255, 255, 0.10); }
    #search-results .nores {
      font-size: 10px;
      color: var(--ink-muted);
      padding: 6px 10px 4px;
    }
    #compass {
      position: absolute;
      bottom: 56px;
      right: 16px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--hairline);
      backdrop-filter: blur(8px) saturate(1.15);
      -webkit-backdrop-filter: blur(8px) saturate(1.15);
      display: grid;
      place-items: center;
      cursor: pointer;
      z-index: 10;
    }
    #compass svg { transition: transform 0.15s; }
    #compass:hover { background: rgba(50, 50, 48, 0.8); }
    #panel {
      position: absolute;
      top: 64px;
      right: 16px;
      width: min(332px, calc(100vw - 32px));
      max-height: calc(100% - 180px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: 18px;
      backdrop-filter: blur(8px) saturate(1.15);
      -webkit-backdrop-filter: blur(8px) saturate(1.15);
      z-index: 11;
      font-size: 12px;
      transform: translateY(0);
      opacity: 1;
      visibility: visible;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.28s ease, visibility 0s;
      will-change: transform, opacity;
    }
    #panel-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.22) transparent;
    }
    #panel-grab { display: none; }
    /* Hidden state animates rather than display:none, so entry/exit slide.
       Desktop card rises into place; mobile sheet slides fully up from below
       (overridden in the media query). */
    #panel.hidden {
      opacity: 0;
      transform: translateY(24px);
      visibility: hidden;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.28s ease, visibility 0s linear 0.42s;
      pointer-events: none;
    }
    #panel .muted { color: var(--ink-muted); }
    #panel .ink { color: var(--ink); }
    /* Pinned header band: block name + actions, above the scroll area so
       nothing scrolls behind the buttons. */
    #panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: none;
      padding: 12px 14px 12px 16px;
    }
    .panel-title { flex: 1; min-width: 0; }
    .panel-head { font-size: 14px; }
    .panel-head strong { font-weight: 650; }
    .pbtn {
      flex: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--hairline);
      background: rgba(255, 255, 255, 0.05);
      color: var(--ink-2);
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
    }
    .pbtn:hover { background: rgba(255, 255, 255, 0.11); color: var(--ink); }
    .pbtn svg { display: block; }
    #panel-share svg { width: 15px; height: 15px; }
    #panel-close svg { width: 13px; height: 13px; }
    .panel-sub { font-size: 11px; margin: 2px 0 0; line-height: 1.4; }
    /* Option-A hero: last sold big, fair range with tucked-away method, trend */
    .hero { margin: 12px 0 2px; }
    .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink-muted); font-weight: 650; }
    .hero-big { font-size: 25px; font-weight: 700; letter-spacing: -0.6px; line-height: 1.05; color: var(--ink); font-variant-numeric: tabular-nums; margin-top: 2px; }
    .hero-mid { font-size: 17px; font-weight: 650; color: var(--ink); }
    .hero-sub { font-size: 11px; color: var(--ink-muted); font-variant-numeric: tabular-nums; margin-top: 3px; }
    .hero-fair { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 8px 10px; margin-top: 13px; }
    .hero-fair-main { flex: 1; min-width: 0; }
    .hero-fairval { font-size: 16px; font-weight: 650; letter-spacing: -0.2px; color: var(--ink); font-variant-numeric: tabular-nums; margin-top: 2px; }
    .trend {
      display: inline-flex; align-items: center; gap: 5px; flex: none;
      font-size: 12px; font-weight: 600; color: #6da7ec;
      background: rgba(109, 167, 236, 0.16); border-radius: 999px; padding: 4px 10px;
      font-variant-numeric: tabular-nums;
    }
    .trend .since { color: var(--ink-muted); font-weight: 500; }
    .funds {
      display: flex; gap: 6px; margin-top: 14px; padding-top: 12px;
      border-top: 1px solid var(--hairline);
    }
    .funds > div { flex: 1; min-width: 0; }
    .funds .fv { font-size: 12.5px; font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; }
    .funds .fk {
      font-size: 9px; color: var(--ink-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .more-hint {
      display: none; width: 100%; align-items: center; justify-content: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      color: #6da7ec; font-family: inherit; font-size: 11px; margin-top: 12px; padding: 7px;
    }
    .more-hint svg { display: block; }
    .info-wrap { position: relative; display: inline-flex; margin-left: 5px; vertical-align: middle; }
    .info {
      width: 13px; height: 13px; border-radius: 50%; border: 1px solid var(--hairline);
      background: none; color: var(--ink-muted); cursor: pointer; padding: 0;
      font-size: 9px; font-weight: 700; line-height: 1; font-family: Georgia, "Times New Roman", serif; font-style: italic;
      display: grid; place-items: center;
    }
    .info-pop {
      position: absolute; bottom: calc(100% + 7px); left: -8px; width: 210px;
      background: rgba(20, 20, 19, 0.97); border: 1px solid var(--hairline); border-radius: 10px;
      backdrop-filter: blur(12px); box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
      padding: 9px 11px; font-size: 10.5px; line-height: 1.45; color: var(--ink-2);
      text-transform: none; letter-spacing: 0; font-weight: 400;
      opacity: 0; visibility: hidden; transform: translateY(3px);
      transition: opacity 0.16s, transform 0.16s, visibility 0s linear 0.16s;
      z-index: 3; pointer-events: none;
    }
    .info-wrap:hover .info-pop, .info-wrap.open .info-pop {
      opacity: 1; visibility: visible; transform: translateY(0);
      transition: opacity 0.16s, transform 0.16s;
    }
    .spark { display: block; width: 100%; margin-top: 2px; }
    .spark-empty { font-size: 11px; margin: 12px 0; }
    .spark-ends {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--ink-muted);
      font-variant-numeric: tabular-nums;
      margin-top: 2px;
    }
    .spark-mult { font-size: 11px; color: var(--ink-2); margin: 4px 0 12px; }
    .panel-txhead { font-size: 10px; margin-bottom: 6px; text-transform: lowercase; }
    .floor-row {
      display: grid;
      grid-template-columns: 36px 1fr 74px 20px;
      gap: 6px;
      align-items: center;
      font-size: 10px;
      font-variant-numeric: tabular-nums;
      padding: 2px 0;
    }
    .floor-bar { height: 7px; border-radius: 4px; background: rgba(255, 255, 255, 0.05); overflow: hidden; }
    .floor-bar i { display: block; height: 100%; border-radius: 4px; }
    .floor-val { text-align: right; color: var(--ink-2); }
    .floor-n { text-align: right; }
    .fair-row {
      display: grid;
      grid-template-columns: 38px 1fr auto;
      gap: 8px;
      align-items: baseline;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      padding-top: 3px;
    }
    .fair-range { font-weight: 650; color: var(--ink); }
    .fair-note { font-size: 9px; margin: 1px 0 5px; }
    .fair-disc { font-size: 9px; margin: 4px 0 12px; font-style: italic; }
    .txlist {
      max-height: 288px;
      overflow-y: auto;
      overflow-x: hidden;
      margin-right: -8px;
      padding-right: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.22) transparent;
    }
    .txlist::-webkit-scrollbar, #panel-scroll::-webkit-scrollbar { width: 5px; }
    .txlist::-webkit-scrollbar-thumb, #panel-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.22);
      border-radius: 3px;
    }
    .txlist::-webkit-scrollbar-track, #panel-scroll::-webkit-scrollbar-track { background: transparent; }
    .tx {
      display: grid;
      grid-template-columns: 52px 32px 40px 36px 1fr;
      gap: 3px;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      padding: 3px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      white-space: nowrap;
    }
    .tx span:nth-child(2), .tx span:nth-child(3), .tx strong { text-align: right; }
    #filter-chip {
      bottom: 130px;
      left: 16px;
      font-size: 11px;
      color: var(--ink);
      padding: 8px 8px 8px 14px;
      gap: 8px;
    }
    #filter-chip.hidden { display: none; }
    #filter-chip span { font-variant-numeric: tabular-nums; }
    #filter-clear {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--hairline);
      background: rgba(255, 255, 255, 0.06);
      color: var(--ink-2);
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }
    #filter-clear:hover { background: rgba(255, 255, 255, 0.14); color: var(--ink); }
    #toast {
      position: absolute;
      bottom: 176px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: 999px;
      backdrop-filter: blur(8px) saturate(1.15);
      -webkit-backdrop-filter: blur(8px) saturate(1.15);
      padding: 9px 18px;
      font-size: 12px;
      color: var(--ink);
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 30;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #legend {
      bottom: 24px;
      left: 16px;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
      border-radius: 16px;
      padding: 10px 14px;
    }
    #legend .caption { font-size: 11px; color: var(--ink-2); }
    #legend .caption-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .seg {
      display: flex;
      gap: 2px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      padding: 2px;
    }
    .seg button {
      border: none;
      background: transparent;
      color: var(--ink-muted);
      font-size: 10px;
      padding: 2px 9px;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
    }
    .seg button.on { background: rgba(255, 255, 255, 0.14); color: var(--ink); }
    #legend .bar {
      height: 8px;
      width: 170px;
      border-radius: 4px;
    }
    #legend .ends {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--ink-muted);
      font-variant-numeric: tabular-nums;
    }
    #scrubber {
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px 8px 8px;
      width: min(520px, calc(100vw - 32px));
    }
    #play {
      width: 36px; height: 36px;
      flex: none;
      border-radius: 50%;
      border: 1px solid var(--hairline);
      background: rgba(255, 255, 255, 0.06);
      color: var(--ink);
      font-size: 13px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.15s;
    }
    #play:hover { background: rgba(255, 255, 255, 0.14); }
    #ticker {
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      flex-direction: column;
      gap: 3px;
      border-radius: 18px;
      padding: 10px 20px;
      text-align: center;
      max-width: min(560px, calc(100vw - 32px));
      transition: opacity 0.3s;
    }
    #event { display: none; flex-direction: column; gap: 1px; }
    #event.on { display: flex; cursor: pointer; }
    #event.on:hover strong { text-decoration: underline; text-underline-offset: 3px; }
    #event strong { font-size: 14px; font-weight: 650; }
    #event span { font-size: 12px; color: var(--ink-2); }
    #stats {
      font-size: 11px;
      color: var(--ink-muted);
      font-variant-numeric: tabular-nums;
      display: flex;
      gap: 7px;
      justify-content: center;
      white-space: nowrap;
    }
    #stats .sep { opacity: 0.5; }
    .slider-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }
    #era-dots {
      position: absolute;
      inset: 0 8px;
      pointer-events: none;
    }
    #era-dots i {
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      margin: -7px 0 0 -7px;
      pointer-events: auto;
      cursor: pointer;
    }
    #era-dots i::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.45);
      transition: background 0.15s, inset 0.15s;
    }
    #era-dots i:hover::after { inset: 3.5px; background: #cde2fb; }
    #month {
      width: 100%;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      cursor: pointer;
    }
    #month::-webkit-slider-thumb {
      appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--ink);
      border: none;
      cursor: grab;
    }
    #month::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--ink);
      border: none;
      cursor: grab;
    }
    #date {
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      min-width: 72px;
      text-align: right;
      color: var(--ink);
    }
    @media (max-width: 640px) {
      /* Header: a compact logo mark on the left, search fills the rest of
         the row. The full "everyblock" wordmark is too wide next to search
         on a phone, so it collapses to the mark. */
      /* Logo chip and search bar share one height so they line up. */
      #title { top: 12px; left: 12px; height: 44px; padding: 0 13px; box-sizing: border-box; }
      #title strong, #title span { display: none; }
      #title-mark { display: block; }
      #search {
        top: 12px;
        left: 66px;
        right: 12px;
        width: auto;
        height: 44px;
        padding: 0 14px;
        box-sizing: border-box;
      }
      /* 16px stops iOS Safari from auto-zooming the page on focus (which,
         with the map owning pinch gestures, the user can't undo). It's a
         hard floor, so the dropdown rows are sized up to match it. */
      #search-input { font-size: 16px; }
      #search-results .hit { font-size: 13.5px; }
      #search-results .hit-main span { font-size: 11px; }
      .hit-badge { font-size: 10px; }
      #legend, #compass { display: none; }
      #filter-chip {
        top: 62px;
        left: 12px;
        right: auto;
        bottom: auto;
        max-width: calc(100vw - 24px);
      }
      #ticker {
        bottom: 78px;
        padding: 8px 14px;
        width: calc(100vw - 24px);
        max-width: none;
      }
      #stats { flex-wrap: wrap; row-gap: 1px; justify-content: center; }
      .maplibregl-ctrl-bottom-right { bottom: 64px; }
      #scrubber {
        bottom: 12px;
        width: calc(100vw - 24px);
        padding: 6px 14px 6px 6px;
      }
      /* Block detail is a draggable bottom sheet: opens as a peek (~42dvh
         visible) showing block, fair range and MRT with the map above it;
         drag or tap the handle to expand to the full breakdown. */
      #panel {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: auto;
        max-width: none;
        height: 88dvh;
        max-height: none;
        border-radius: 20px 20px 0 0;
        transform: translateY(var(--peek-y, 46dvh)); /* peek, fitted per block */
      }
      #panel.expanded { transform: translateY(0); }
      #panel.hidden { opacity: 1; transform: translateY(100%); }
      #panel.dragging { transition: none; }
      /* Peek doesn't scroll: to see the evidence you expand. Only the
         expanded sheet scrolls its body. */
      #panel-scroll { overflow: hidden; }
      #panel.expanded #panel-scroll { overflow-y: auto; }
      /* The expand hint shows only in the peek state. */
      .more-hint { display: flex; }
      #panel.expanded .more-hint { display: none; }
      #panel-scroll { padding: 0 16px calc(18px + env(safe-area-inset-bottom)); }
      /* The handle: a full-width drag target with a centered grabber bar. */
      #panel-grab {
        display: block;
        flex: none;
        height: 26px;
        touch-action: none;
        cursor: grab;
      }
      #panel-grab::before {
        content: "";
        display: block;
        width: 40px;
        height: 4px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.3);
        margin: 9px auto 0;
      }
      #toast { bottom: 142px; }
    }
    #loading {
      position: absolute;
      inset: 0;
      background: #0d0d0d;
      z-index: 20;
      transition: opacity 0.9s ease;
    }
    #loading.done { opacity: 0; pointer-events: none; }
    #load-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .load-bar {
      position: absolute;
      left: 50%;
      bottom: 60px;
      transform: translateX(-50%);
      width: 132px;
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.09);
      overflow: hidden;
      pointer-events: none;
    }
    #load-fill {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: #6da7ec;
      transition: width 0.25s linear;
    }
    .maplibregl-marker { z-index: 5; pointer-events: none !important; }
    .mrt-marker {
      display: flex;
      align-items: center;
      gap: 5px;
      pointer-events: none;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      white-space: nowrap;
      transition: opacity 0.45s;
    }
    .mrt-marker i {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #fff;
      border: 2.5px solid #383835;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45);
      flex: none;
    }
    .mrt-marker span {
      font-size: 11px;
      font-weight: 600;
      color: #ece9e2;
      text-shadow: 0 0 4px rgba(13, 13, 13, 0.95), 0 1px 2px rgba(13, 13, 13, 0.9);
    }
    .mrt-marker b {
      font-size: 8.5px;
      font-weight: 700;
      color: #fff;
      padding: 1.5px 5.5px;
      border-radius: 999px;
      letter-spacing: 0.2px;
    }
    .deck-tooltip {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif !important;
      background: var(--surface) !important;
      border: 1px solid var(--hairline);
      border-radius: 12px !important;
      padding: 10px 12px !important;
      font-size: 12px !important;
      line-height: 1.45 !important;
      color: var(--ink) !important;
      backdrop-filter: blur(8px) saturate(1.15);
      -webkit-backdrop-filter: blur(8px) saturate(1.15);
    }
    .deck-tooltip .sub { color: var(--ink-2); }
    .deck-tooltip .muted { color: var(--ink-muted); }
    .deck-tooltip .val { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="title" class="chip"><img id="title-mark" src="/favicon.svg" alt="everyblock" /><strong>everyblock</strong><span>check any block before you buy or sell</span></div>
  <div id="search" class="chip">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#898781" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5"/></svg>
    <input id="search-input" type="text" placeholder="Search, or ask about prices" autocomplete="off" spellcheck="false" />
    <div id="search-results"></div>
  </div>
  <button id="compass" aria-label="Reset north" title="Rotate: right-drag or Ctrl+drag (two fingers on touch). Click to face north.">
    <svg viewBox="0 0 24 24" width="20" height="20">
      <path d="M12 3 L15.4 13 H8.6 Z" fill="#e66767"/>
      <path d="M8.6 13 H15.4 L12 21 Z" fill="#c3c2b7"/>
    </svg>
  </button>
  <aside id="panel" class="hidden"></aside>
  <div id="legend" class="chip">
    <div class="caption-row">
      <span class="caption" id="legend-caption">S$ / m² · trailing 12 mo</span>
      <div class="seg">
        <button id="seg-now" class="on">today</button>
        <button id="seg-all">all time</button>
      </div>
    </div>
    <div class="bar" id="legend-bar"></div>
    <div class="ends"><span id="legend-min"></span><span id="legend-max"></span></div>
    <div class="caption-row" style="margin-top:4px">
      <span class="caption">basemap</span>
      <div class="seg">
        <button id="base-dark" class="on">dark</button>
        <button id="base-sat">satellite</button>
      </div>
    </div>
    <div class="caption-row" style="margin-top:4px">
      <span class="caption">mrt stations</span>
      <div class="seg">
        <button id="st-on" class="on">on</button>
        <button id="st-off">off</button>
      </div>
    </div>
  </div>
  <div id="ticker" class="chip">
    <div id="event">
      <strong id="event-title"></strong>
      <span id="event-sub"></span>
    </div>
    <div id="stats">
      <span id="stat-median"></span><span class="sep">·</span><span id="stat-sales"></span><span class="sep">·</span><span id="stat-blocks"></span>
    </div>
  </div>
  <div id="scrubber" class="chip">
    <button id="play" aria-label="Play">&#9654;</button>
    <div class="slider-wrap">
      <input id="month" type="range" min="0" max="438" value="438" step="1" />
      <div id="era-dots"></div>
    </div>
    <div id="date"></div>
  </div>
  <div id="filter-chip" class="chip hidden">
    <span id="filter-label"></span>
    <button id="filter-clear" aria-label="Clear filter">×</button>
  </div>
  <div id="toast"></div>
  <div id="loading">
    <canvas id="load-canvas"></canvas>
    <div class="load-bar"><i id="load-fill"></i></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
